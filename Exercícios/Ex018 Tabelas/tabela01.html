<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabelas</title>
    <STYLE>
        body {
            font-family: Arial, Helvetica, sans-serif;
        }

        table {
            width: 400px;
            height: 400px;
            border-collapse: collapse;
        }

        td {
            border: 2px solid black;
            padding: 8px;
            text-align: center;  /* Alinhamento Horizontal */
            vertical-align: bottom; /* Alinhamento Vertical */
        }

        .numero {
            text-align: right;
        }
    </STYLE>
</head>
<body>
    <h1>Primeira Tabela</h1>
    <!--
    HIERARQUIA DE TABELAS (simples)
    TABLE = tabela
        TABLEW ROW = linha de tabela
            TABLE HEADER = cabeçalho da tabela
                TABLE DATA = dado de tabela
    -->
    <table>
        <tr> <!--PRIMEIRA LINHA-->
            <td>A1</td>  <!--DADOS DA TABELA-->
            <td>B1</td>  <!--DADOS DA TABELA-->
            <td>C1</td>  <!--DADOS DA TABELA-->
        </tr>
        <tr> <!--SEGUNDA LINHA-->
            <td>A2</td>  <!--DADOS DA TABELA-->
            <td>B2</td>  <!--DADOS DA TABELA-->
            <td class="numero">C2</td>  <!--DADOS DA TABELA-->
        </tr>
        <tr> <!--TERCEIRA LINHA-->
            <td>A3</td>  <!--DADOS DA TABELA-->
            <td>B3</td>  <!--DADOS DA TABELA-->
            <td class="numero">C3</td>  <!--DADOS DA TABELA-->
        </tr>
        <tr> <!--QUARTA LINHA-->
            <td>A4</td>  <!--DADOS DA TABELA-->
            <td>B4</td>  <!--DADOS DA TABELA-->
            <td>C4</td>  <!--DADOS DA TABELA-->
        </tr>
    </table>
</body>
</html>

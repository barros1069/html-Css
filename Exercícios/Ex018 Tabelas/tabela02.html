<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabelas</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
        }

        table {
            width: 500px;
            position: relative;
        }

        caption {
            background-color: dimgray;
            font-size: bolder;
            font-family: Arial, Helvetica, sans-serif;
            padding: 15px;
            color: white;
        }

        th, td {
            border: 1px solid black;
            padding: 10px;
        }

        thead {
            background-color: dimgray;
            color: white;
        }

        thead > tr > th {
            position: sticky;
            top: 0;
        }

        tbody > tr:nth-child(2n) {  /* Efeito Zebrado */
            background-color: rgb(169, 169, 169);
        }
    </style>
</head>
<body>
    <h1>Uso de Tabelas Grandes</h1>
    <!--
    ANATOMIA PARA TABELAS GRANDES
        
        TABLE
         CAPTION > Título da tabela
            THEAD
                TR. TD, TH
            TBODY
                TR, TD, TH
            TFOOTER
                TR, TD, TH
    -->
                <table>
                    <caption>População das Unidades Federativas</caption>
                    <thead>
                        <tr>
                            <th scope="col">Estado</th>  <!--col = coluna (horizontal) para coluna abaixo -->
                            <th scope="col" style="width: 50px;">População</th> <!--col = coluna (horizontal) para coluna abaixo -->
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>São Paulo</td>
                            <td>49 919 300</td>
                        <tr>
                            <td>Minas Gerais</td>
                            <td>18 445 67</td>
                        </tr>
                        <tr>
                            <td>Rio de Janeiro</td>
                            <td>17 899 444</td>
                        </tr>
                        </tr>
                    </tbody>
                    <tfoot>
                        <tr>
                            <th scope="row">Total de habitantes</th> <!--row = linha (vertical) para o lado-->
                            <td>00000</td>
                        </tr>
                    </tfoot>
                </table>
</body>
</html>

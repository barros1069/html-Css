<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
        }

        table {
            width: 500px;
        }

        th, td {
            border: 1px solid black;
            padding: 10px;
        }

        thead {
            background-color: dimgray;
            color: white;
        }
    </style>
</head>
<body>
    <h1>Uso de Tabelas Grandes</h1>
    <!--
    ANATOMIA PARA TABELAS GRANDES
        CAPTION > Título da tabela
        TABLE
            THEAD
                TR. TD, TH
            TBODY
                TR, TD, TH
            TFOOTER
                TR, TD, TH
    -->
                <table>
                    <thead>
                        <tr>
                            <th>Estado</th>
                            <th>População</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>São Paulo</td>
                            <td>49 919 300</td>
                        <tr>
                            <td>Minas Gerais</td>
                            <td>18 445 67</td>
                        </tr>
                        <tr>
                            <td>Rio de Janeiro</td>
                            <td>17 899 444</td>
                        </tr>
                        </tr>
                    </tbody>
                    <tfoot>
                        <tr>
                            <th>Total de habitantes</th>
                            <td>00000</td>
                        </tr>
                    </tfoot>
                </table>
</body>
</html>
